<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folio</title>
  <style>
    :root {
      --bg:         #ffffff;
      --surface:    #f5f5f5;
      --border:     #e0e0e0;
      --text:       #1a1a1a;
      --muted:      #777;
      --accent:     #2563eb;
      --accent-fg:  #ffffff;
      --radius:     6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #111111;
        --surface: #1e1e1e;
        --border:  #333333;
        --text:    #e8e8e8;
        --muted:   #888888;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Layout ── */
    #app { max-width: 760px; margin: 0 auto; padding: 0 1rem; }

    /* ── Header ── */
    #app-header {
      position: sticky; top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      display: none;
      align-items: center;
      gap: 0.6rem;
      z-index: 10;
    }
    #app-header strong { font-size: 1rem; white-space: nowrap; flex: 1; }
    #search {
      flex: 1; min-width: 0;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
    }
    #search:focus { outline: 2px solid var(--accent); border-color: transparent; }

    @media (max-width: 560px) {
      #app-header { flex-wrap: wrap; gap: 0.4rem; }
      #app-header strong { flex: 1; }
      #search { order: 99; flex: 1 0 100%; }
      #btn-open, #btn-toggle-all, #view-filter { display: none; }
      #app-header button { font-size: 0.78rem; padding: 0.28rem 0.5rem; }
    }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.3rem 0.65rem;
      white-space: nowrap;
      line-height: 1.4;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    button.primary:hover { opacity: 0.88; color: var(--accent-fg); }
    button.ghost { background: transparent; border-color: transparent; }
    button.ghost:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
    button.danger:hover { color: #dc2626; border-color: #dc2626; }

    /* ── Welcome ── */
    #welcome {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 5rem 1rem; text-align: center;
    }
    #welcome h1 { font-size: 2.2rem; letter-spacing: -0.02em; }
    #welcome p  { color: var(--muted); max-width: 380px; font-size: 0.95rem; }
    .welcome-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
    #restore-hint { font-size: 0.85rem; color: var(--muted); padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); display: none; }
    #restore-hint button { margin-left: 0.5rem; }

    /* ── Journal ── */
    #journal { display: none; padding: 1.5rem 0 4rem; }

    /* ── Day ── */
    .day { margin-bottom: 2rem; }
    .day-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .day-date {
      font-size: 0.9rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.04em; flex: 1;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .day-date::before { content: '▾'; font-size: 0.75rem; transition: transform 0.15s; display: inline-block; }
    .day.collapsed .day-date::before { transform: rotate(-90deg); }
    .day.collapsed .topics { display: none; }
    .day-actions { display: flex; gap: 0.3rem; }

    /* ── Topic ── */
    .topic { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.6rem; overflow: hidden; }

    .topic-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .topic-title {
      font-size: 0.9rem; font-weight: 600; flex: 1;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .topic-title::before { content: '▾'; font-size: 0.7rem; transition: transform 0.15s; display: inline-block; }
    .topic.collapsed .topic-title::before { transform: rotate(-90deg); }
    .topic.collapsed .topic-preview,
    .topic.collapsed .topic-editor { display: none; }
    .topic.collapsed .topic-header { border-bottom: none; }
    .topic-title-input {
      flex: 1; font-size: 0.9rem; font-weight: 600;
      border: 1px solid var(--accent); border-radius: 3px;
      padding: 0.1rem 0.4rem; background: var(--bg); color: var(--text);
      display: none;
    }
    .topic-actions { display: flex; gap: 0.3rem; }

    /* ── Preview ── */
    .topic-preview {
      padding: 0.75rem; font-size: 0.9rem; line-height: 1.75;
      cursor: pointer; min-height: 2.5rem;
    }
    .topic-preview:hover { background: var(--surface); }
    .topic-preview.placeholder { color: var(--muted); font-style: italic; }
    .topic-preview p   { margin-bottom: 0.6rem; }
    .topic-preview p:last-child { margin-bottom: 0; }
    .topic-preview ul, .topic-preview ol { padding-left: 1.5rem; margin-bottom: 0.6rem; }
    .topic-preview code { background: var(--surface); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }
    .topic-preview pre  { background: var(--surface); border-radius: var(--radius); padding: 0.75rem; overflow-x: auto; margin-bottom: 0.6rem; }
    .topic-preview pre code { background: none; padding: 0; }
    .topic-preview blockquote { border-left: 3px solid var(--border); padding-left: 0.75rem; color: var(--muted); }

    /* ── Editor ── */
    .topic-editor { display: none; }
    .topic-editor.open { display: block; }

    .md-toolbar {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 2px; padding: 0.3rem 0.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .md-toolbar button {
      font-size: 0.75rem; font-style: normal;
      padding: 0.2rem 0.4rem; min-width: 26px; line-height: 1.4;
    }
    .md-toolbar button b, .md-toolbar button em, .md-toolbar button s { font-size: inherit; }
    .tb-sep { width: 1px; height: 1rem; background: var(--border); margin: 0 0.15rem; }

    textarea {
      display: block; width: 100%;
      padding: 0.75rem;
      border: none; outline: none;
      background: var(--bg); color: var(--text);
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 0.875rem; line-height: 1.65;
      resize: vertical; min-height: 120px;
      field-sizing: content;
      transition: outline 0.1s, background 0.1s;
    }
    textarea.drag-over {
      outline: 2px dashed var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--bg));
    }

    .editor-footer {
      display: flex; gap: 0.5rem; padding: 0.5rem 0.75rem;
      background: var(--surface); border-top: 1px solid var(--border);
    }

    /* ── Search highlight ── */
    mark { background: #fef08a; color: #111; border-radius: 2px; padding: 0 1px; }
    @media (prefers-color-scheme: dark) { mark { background: #854d0e; color: #fef9c3; } }

    /* ── Dialog ── */
    dialog {
      border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.5);
      background: var(--bg); color: var(--text);
      padding: 1.5rem; max-width: 420px; width: 90%;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    dialog::backdrop { background: rgba(0,0,0,0.45); }
    dialog h3 { margin-bottom: 1rem; font-size: 1rem; }
    .field { margin-bottom: 0.75rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }
    .field input, .field textarea {
      width: 100%; padding: 0.4rem 0.6rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-size: 0.9rem;
    }
    .field input:focus, .field textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .dialog-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }

    /* ── Status bar ── */
    #statusbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted);
      padding: 0.3rem 1rem; display: none;
      justify-content: space-between; align-items: center;
      z-index: 20;
    }
    #statusbar.visible { display: flex; }

    /* ── View filter ── */
    #view-filter {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    #view-filter button {
      border: none; border-radius: 0;
      border-right: 1px solid var(--border);
      padding: 0.3rem 0.55rem;
    }
    #view-filter button:last-child { border-right: none; }
    button.active, button.active:hover {
      background: var(--accent); color: var(--accent-fg); border-color: var(--accent);
    }

    /* ── Empty states ── */
    .no-topics { font-size: 0.85rem; color: var(--muted); padding: 0.5rem 0; }
    .no-results { color: var(--muted); text-align: center; padding: 3rem 1rem; }
  </style>
</head>
<body>

<div id="app">

  <!-- Welcome -->
  <div id="welcome">
    <h1>Folio</h1>
    <p>Dein persönliches Arbeitsjournal. Öffne eine <code>journal.md</code> oder starte neu.</p>
    <div class="welcome-actions">
      <button class="primary" onclick="openFile()">📂 Datei öffnen</button>
      <button onclick="newJournal()">✨ Neu starten</button>
    </div>
    <div id="restore-hint">
      Nicht gespeicherte Änderungen vom <strong id="restore-date"></strong>.
      <button onclick="restoreFromStorage()">Wiederherstellen</button>
    </div>
  </div>

  <!-- App header (hidden until file is loaded) -->
  <header id="app-header">
    <strong>Folio</strong>
    <div id="view-filter">
      <button class="ghost active" data-filter="all"   onclick="setFilter('all')">Alle</button>
      <button class="ghost"        data-filter="week"  onclick="setFilter('week')">Woche</button>
      <button class="ghost"        data-filter="month" onclick="setFilter('month')">Monat</button>
    </div>
    <input type="search" id="search" placeholder="Suchen…" autocomplete="off">
    <button onclick="goToToday()">Heute</button>
    <button id="btn-toggle-all" onclick="toggleAll()" title="Alle ein-/ausklappen">± Alle</button>
    <button onclick="showNewDayDialog()">+ Tag</button>
    <button id="btn-save" class="primary" onclick="saveFile()">Speichern</button>
    <button id="btn-download" onclick="downloadCurrent()" title="Als journal.md herunterladen" style="display:none">↓ Download</button>
    <button id="btn-open" onclick="openFile()" title="Andere Datei öffnen">📂</button>
  </header>

  <!-- Journal -->
  <div id="journal"></div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="status-file">—</span>
  <span id="status-stats"></span>
  <span id="status-mode">—</span>
</div>

<!-- Template: Day -->
<template id="tpl-day">
  <div class="day">
    <div class="day-header">
      <span class="day-date"></span>
      <div class="day-actions">
        <button class="ghost add-topic-btn">+ Thema</button>
        <button class="ghost danger delete-day-btn">✕</button>
      </div>
    </div>
    <div class="topics"></div>
  </div>
</template>

<!-- Template: Topic -->
<template id="tpl-topic">
  <div class="topic">
    <div class="topic-header">
      <span class="topic-title"></span>
      <input class="topic-title-input" type="text">
      <div class="topic-actions">
        <button class="ghost move-up-btn"   title="Nach oben">↑</button>
        <button class="ghost move-down-btn" title="Nach unten">↓</button>
        <button class="ghost rename-btn"    title="Umbenennen">✎</button>
        <button class="ghost danger delete-topic-btn" title="Löschen">✕</button>
      </div>
    </div>
    <div class="topic-preview"></div>
    <div class="topic-editor">
      <div class="md-toolbar">
        <button type="button" data-wrap="**|**" title="Fett (Cmd+B)"><b>B</b></button>
        <button type="button" data-wrap="*|*"   title="Kursiv (Cmd+I)"><em>I</em></button>
        <button type="button" data-wrap="~~|~~" title="Durchgestrichen"><s>S</s></button>
        <span class="tb-sep"></span>
        <button type="button" data-prefix="### " title="Überschrift 3">H3</button>
        <button type="button" data-prefix="#### " title="Überschrift 4">H4</button>
        <span class="tb-sep"></span>
        <button type="button" data-prefix="- "  title="Liste">• —</button>
        <button type="button" data-prefix="1. " title="Nummeriert">1.</button>
        <span class="tb-sep"></span>
        <button type="button" data-wrap="[|](url)" title="Link">🔗</button>
        <button type="button" data-wrap="`|`"       title="Inline-Code">&lt;&gt;</button>
        <button type="button" data-wrap="```\n|\n```" title="Code-Block">```</button>
      </div>
      <textarea placeholder="Markdown…"></textarea>
      <div class="editor-footer">
        <button class="primary save-btn">Speichern</button>
        <button class="ghost cancel-btn">Abbrechen</button>
      </div>
    </div>
  </div>
</template>

<!-- Dialog: New Day -->
<dialog id="dlg-day">
  <h3>Neuer Tag</h3>
  <div class="field">
    <label>Datum</label>
    <input type="date" id="dlg-day-date">
  </div>
  <div class="dialog-footer">
    <button onclick="document.getElementById('dlg-day').close()">Abbrechen</button>
    <button class="primary" onclick="confirmNewDay()">Anlegen</button>
  </div>
</dialog>

<!-- Dialog: New Topic -->
<dialog id="dlg-topic">
  <h3>Neues Thema</h3>
  <div class="field">
    <label>Titel</label>
    <input type="text" id="dlg-topic-title" placeholder="z.B. Standup">
  </div>
  <div class="dialog-footer">
    <button onclick="document.getElementById('dlg-topic').close()">Abbrechen</button>
    <button class="primary" onclick="confirmNewTopic()">Hinzufügen</button>
  </div>
</dialog>

<!-- Fallback file input -->
<input type="file" id="file-input" accept=".md,text/plain" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let journal   = [];      // [{ date: string, topics: [{ title, content }] }]
let fileHandle = null;   // FileSystemFileHandle (FSA API)
let isDirty    = false;
let pendingDate = null;

const LS_CONTENT = 'folio_content';
const LS_TS      = 'folio_ts';
const hasFSA     = 'showOpenFilePicker' in window;
let currentFilter = 'all';

// ── File I/O ───────────────────────────────────────────────────────────────
async function openFile() {
  if (hasFSA) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Markdown', accept: { 'text/plain': ['.md', '.txt'] } }],
      });
      fileHandle = handle;
      const file = await handle.getFile();
      init(await file.text());
      setStatus(`📄 ${handle.name}`, hasFSA ? 'Direktes Speichern aktiv' : '');
    } catch (e) {
      if (e.name !== 'AbortError') alert('Fehler beim Öffnen: ' + e.message);
    }
  } else {
    document.getElementById('file-input').click();
  }
}

document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  fileHandle = null;
  init(await file.text());
  setStatus(`📄 ${file.name}`, 'Speichern = Download');
  e.target.value = '';
});

function newJournal() {
  fileHandle = null;
  init('');
  setStatus('Neues Journal', 'Noch nicht gespeichert');
}

function init(markdown) {
  journal = parse(markdown);
  isDirty = false;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('journal').style.display = 'block';
  document.getElementById('statusbar').classList.add('visible');
  document.getElementById('btn-download').style.display = fileHandle ? 'none' : '';
  updateSaveBtn();
  render();
}

async function saveFile() {
  const content = serialize();
  localStorage.setItem(LS_CONTENT, content);
  localStorage.setItem(LS_TS, new Date().toISOString());
  isDirty = false;
  updateSaveBtn();

  if (fileHandle) {
    try {
      const w = await fileHandle.createWritable();
      await w.write(content); await w.close();
      flashBtn('✓ Gespeichert');
    } catch (e) { alert('Speichern fehlgeschlagen: ' + e.message); }
  } else {
    flashBtn('✓ Gespeichert');
  }
}

function downloadCurrent() {
  download(serialize());
}

function download(content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/markdown' }));
  a.download = 'journal.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Local Storage ──────────────────────────────────────────────────────────
(function checkLS() {
  const saved = localStorage.getItem(LS_CONTENT);
  const ts    = localStorage.getItem(LS_TS);
  if (!saved || !ts) return;
  const hint = document.getElementById('restore-hint');
  document.getElementById('restore-date').textContent =
    new Date(ts).toLocaleString('de-DE');
  hint.style.display = 'block';
})();

function restoreFromStorage() {
  fileHandle = null;
  init(localStorage.getItem(LS_CONTENT) || '');
  setStatus('Wiederhergestellt aus Local Storage', 'Speichern = Download');
}

// Auto-save to LS when dirty
setInterval(() => {
  if (isDirty) {
    localStorage.setItem(LS_CONTENT, serialize());
    localStorage.setItem(LS_TS, new Date().toISOString());
  }
}, 30_000);

// ── Parser ─────────────────────────────────────────────────────────────────
function parse(md) {
  const days = [];
  let day = null, title = null, lines = [];

  function flush() {
    if (day && title !== null)
      day.topics.push({ title, content: lines.join('\n').trim() });
    lines = [];
  }

  for (const line of md.split('\n')) {
    if (line.startsWith('# ')) {
      flush(); title = null;
      day = { date: line.slice(2).trim(), topics: [] };
      days.push(day);
    } else if (line.startsWith('## ') && day) {
      flush(); title = line.slice(3).trim();
    } else if (title !== null) {
      lines.push(line);
    }
  }
  flush();
  return days;
}

function serialize() {
  const out = [];
  for (const day of journal) {
    out.push(`# ${day.date}`);
    for (const t of day.topics) {
      out.push(`## ${t.title}`);
      if (t.content) { out.push(''); out.push(t.content); }
      out.push('');
    }
  }
  return out.join('\n').replace(/\n{3,}/g, '\n\n').trimEnd() + '\n';
}

// ── Dirty / Save button ────────────────────────────────────────────────────
function markDirty() { isDirty = true; updateSaveBtn(); }

function updateSaveBtn() {
  const btn = document.getElementById('btn-save');
  if (!btn) return;
  btn.textContent = isDirty ? '● Speichern' : 'Speichern';
  btn.classList.toggle('primary', isDirty);
}

let flashTimer;
function flashBtn(label) {
  const btn = document.getElementById('btn-save');
  btn.textContent = label;
  clearTimeout(flashTimer);
  flashTimer = setTimeout(updateSaveBtn, 2500);
}

// ── Render ─────────────────────────────────────────────────────────────────
function filterByView(days) {
  if (currentFilter === 'all') return days;
  const now = new Date();
  if (currentFilter === 'week') {
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
    const from = mon.toISOString().slice(0, 10);
    const to   = today();
    return days.filter(d => d.date >= from && d.date <= to);
  }
  if (currentFilter === 'month') {
    const prefix = now.toISOString().slice(0, 7);
    return days.filter(d => d.date.startsWith(prefix));
  }
  return days;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === f));
  render(document.getElementById('search').value);
}

function updateStats() {
  const days    = journal.length;
  const topics  = journal.reduce((n, d) => n + d.topics.length, 0);
  const words   = journal.reduce((n, d) =>
    n + d.topics.reduce((m, t) =>
      m + (t.content ? t.content.trim().split(/\s+/).filter(Boolean).length : 0), 0), 0);
  document.getElementById('status-stats').textContent =
    `${days} Tage · ${topics} Themen · ${words} Wörter`;
}

function render(q = '') {
  q = q.toLowerCase();
  const container = document.getElementById('journal');
  container.innerHTML = '';

  let days = q ? journal.map(day => {
    if (day.date.includes(q)) return day;
    const topics = day.topics.filter(t =>
      t.title.toLowerCase().includes(q) || t.content.toLowerCase().includes(q));
    return topics.length ? { ...day, topics } : null;
  }).filter(Boolean) : journal;

  days = filterByView(days);

  if (!days.length) {
    const msg = q ? 'Keine Treffer.' :
      currentFilter === 'week'  ? 'Keine Einträge diese Woche.' :
      currentFilter === 'month' ? 'Keine Einträge diesen Monat.' :
      'Kein Inhalt. Starte mit &ldquo;+ Tag&rdquo;.';
    container.innerHTML = `<div class="no-results">${msg}</div>`;
    updateStats();
    return;
  }
  days.forEach(day => container.appendChild(makeDay(day, q)));
  updateStats();
}

function makeDay(day, q) {
  const frag = document.getElementById('tpl-day').content.cloneNode(true);
  const el   = frag.querySelector('.day');
  el.dataset.date = day.date;
  const dateEl = frag.querySelector('.day-date');
  dateEl.innerHTML = q ? hl(day.date, q) : esc(day.date);
  dateEl.onclick = () => el.classList.toggle('collapsed');

  frag.querySelector('.add-topic-btn').onclick = () => showNewTopicDialog(day.date);
  frag.querySelector('.delete-day-btn').onclick = () => {
    if (!confirm(`Tag „${day.date}" und alle Themen löschen?`)) return;
    journal = journal.filter(d => d.date !== day.date);
    markDirty();
    render(document.getElementById('search').value);
  };

  const topicsEl = frag.querySelector('.topics');
  if (!day.topics.length)
    topicsEl.innerHTML = '<div class="no-topics">Keine Themen — klicke auf + Thema.</div>';
  else
    day.topics.forEach(t => topicsEl.appendChild(makeTopic(day.date, t, q)));

  return frag;
}

function makeTopic(date, topic, q) {
  const frag     = document.getElementById('tpl-topic').content.cloneNode(true);
  const titleEl  = frag.querySelector('.topic-title');
  const titleIn  = frag.querySelector('.topic-title-input');
  const preview  = frag.querySelector('.topic-preview');
  const editor   = frag.querySelector('.topic-editor');
  const textarea = frag.querySelector('textarea');

  titleEl.innerHTML = q ? hl(topic.title, q) : esc(topic.title);
  renderPreview(preview, topic.content, q);

  // ── Collapse topic ──
  titleEl.onclick = () => titleEl.closest('.topic').classList.toggle('collapsed');

  // ── Click preview → edit ──
  preview.onclick = () => openEditor();

  // ── Rename ──
  frag.querySelector('.rename-btn').onclick = () => {
    titleEl.style.display = 'none';
    titleIn.style.display = 'block';
    titleIn.value = topic.title;
    titleIn.focus(); titleIn.select();
  };
  const applyRename = () => {
    const v = titleIn.value.trim();
    if (v && v !== topic.title) {
      const d = journal.find(d => d.date === date);
      const t = d?.topics.find(t => t.title === topic.title);
      if (t) { t.title = v; topic.title = v; markDirty(); }
    }
    titleEl.innerHTML = esc(topic.title);
    titleEl.style.display = ''; titleIn.style.display = 'none';
  };
  titleIn.onblur   = applyRename;
  titleIn.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); applyRename(); }
    if (e.key === 'Escape') { titleIn.value = topic.title; applyRename(); }
  };

  // ── Move up / down ──
  frag.querySelector('.move-up-btn').onclick = () => {
    const d = journal.find(d => d.date === date);
    if (!d) return;
    const i = d.topics.findIndex(t => t.title === topic.title);
    if (i <= 0) return;
    [d.topics[i - 1], d.topics[i]] = [d.topics[i], d.topics[i - 1]];
    markDirty(); render(document.getElementById('search').value);
  };
  frag.querySelector('.move-down-btn').onclick = () => {
    const d = journal.find(d => d.date === date);
    if (!d) return;
    const i = d.topics.findIndex(t => t.title === topic.title);
    if (i < 0 || i >= d.topics.length - 1) return;
    [d.topics[i], d.topics[i + 1]] = [d.topics[i + 1], d.topics[i]];
    markDirty(); render(document.getElementById('search').value);
  };

  // ── Delete ──
  frag.querySelector('.delete-topic-btn').onclick = () => {
    if (!confirm(`„${topic.title}" löschen?`)) return;
    const d = journal.find(d => d.date === date);
    if (d) { d.topics = d.topics.filter(t => t.title !== topic.title); markDirty(); }
    render(document.getElementById('search').value);
  };

  // ── Editor open/close ──
  function openEditor() {
    textarea.value = topic.content;
    preview.style.display = 'none';
    editor.classList.add('open');
    textarea.focus();
  }
  function closeEditor(save) {
    if (save) {
      const d = journal.find(d => d.date === date);
      const t = d?.topics.find(t => t.title === topic.title);
      if (t) { t.content = textarea.value; topic.content = textarea.value; markDirty(); }
      renderPreview(preview, topic.content, '');
    }
    editor.classList.remove('open');
    preview.style.display = '';
  }
  frag.querySelector('.save-btn').onclick   = () => closeEditor(true);
  frag.querySelector('.cancel-btn').onclick = () => closeEditor(false);

  // ── Toolbar ──
  frag.querySelectorAll('[data-wrap]').forEach(btn =>
    btn.addEventListener('mousedown', e => { e.preventDefault(); insertWrap(textarea, ...btn.dataset.wrap.split('|')); }));
  frag.querySelectorAll('[data-prefix]').forEach(btn =>
    btn.addEventListener('mousedown', e => { e.preventDefault(); insertPrefix(textarea, btn.dataset.prefix); }));

  // ── Bilder: Drag & Drop + Einfügen ──
  textarea.addEventListener('dragover', e => { e.preventDefault(); textarea.classList.add('drag-over'); });
  textarea.addEventListener('dragleave', () => textarea.classList.remove('drag-over'));
  textarea.addEventListener('drop', e => {
    e.preventDefault();
    textarea.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    files.forEach(f => insertImage(textarea, f));
  });
  textarea.addEventListener('paste', e => {
    const files = [...e.clipboardData.items]
      .filter(i => i.kind === 'file' && i.type.startsWith('image/'))
      .map(i => i.getAsFile());
    if (!files.length) return;
    e.preventDefault();
    files.forEach(f => insertImage(textarea, f));
  });

  return frag;
}

function renderPreview(el, content, q) {
  if (content) {
    el.innerHTML = marked.parse(content);
    el.classList.remove('placeholder');
    if (q) highlightDOM(el, q);
  } else {
    el.textContent = 'Kein Inhalt – klicken zum Bearbeiten';
    el.classList.add('placeholder');
  }
}

function highlightDOM(root, q) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  nodes.forEach(node => {
    if (!re.test(node.textContent)) return;
    const span = document.createElement('span');
    span.innerHTML = esc(node.textContent).replace(re, m => `<mark>${m}</mark>`);
    node.parentNode.replaceChild(span, node);
  });
}

// ── Toolbar helpers ────────────────────────────────────────────────────────
function insertWrap(ta, before, after) {
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.value = ta.value.slice(0, s) + before + sel + after + ta.value.slice(e);
  ta.focus();
  ta.setSelectionRange(s + before.length, s + before.length + sel.length);
}
function insertPrefix(ta, prefix) {
  const s   = ta.selectionStart;
  const bol = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value  = ta.value.slice(0, bol) + prefix + ta.value.slice(bol);
  ta.focus();
  ta.setSelectionRange(s + prefix.length, s + prefix.length);
}
function insertImage(ta, file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const md     = `![](${ev.target.result})`;
    const s      = ta.selectionStart;
    const before = ta.value.slice(0, s);
    const after  = ta.value.slice(s);
    const pre    = before.length && !before.endsWith('\n') ? '\n' : '';
    ta.value     = before + pre + md + '\n' + after;
    const cur    = (before + pre + md + '\n').length;
    ta.focus();
    ta.setSelectionRange(cur, cur);
  };
  reader.readAsDataURL(file);
}

// ── Day / Topic creation ───────────────────────────────────────────────────
function toggleAll() {
  const all = document.querySelectorAll('.day, .topic');
  const anyOpen = [...all].some(el => !el.classList.contains('collapsed'));
  all.forEach(el => el.classList.toggle('collapsed', anyOpen));
}

function goToToday() {
  const date = today();
  if (!journal.some(d => d.date === date)) {
    const i = journal.findIndex(d => d.date < date);
    const entry = { date, topics: [] };
    i < 0 ? journal.push(entry) : journal.splice(i, 0, entry);
    markDirty(); render();
  }
  setTimeout(() => document.querySelector(`[data-date="${date}"]`)?.scrollIntoView({ behavior: 'smooth' }), 50);
}

function showNewDayDialog() {
  document.getElementById('dlg-day-date').value = today();
  document.getElementById('dlg-day').showModal();
}
function confirmNewDay() {
  const date = document.getElementById('dlg-day-date').value;
  if (!date) return;
  document.getElementById('dlg-day').close();
  if (journal.some(d => d.date === date)) {
    document.querySelector(`[data-date="${date}"]`)?.scrollIntoView({ behavior: 'smooth' });
    return;
  }
  const i = journal.findIndex(d => d.date < date);
  const entry = { date, topics: [] };
  i < 0 ? journal.push(entry) : journal.splice(i, 0, entry);
  markDirty();
  render();
  setTimeout(() => document.querySelector(`[data-date="${date}"]`)?.scrollIntoView({ behavior: 'smooth' }), 50);
}

function showNewTopicDialog(date) {
  pendingDate = date;
  document.getElementById('dlg-topic-title').value = '';
  document.getElementById('dlg-topic').showModal();
  setTimeout(() => document.getElementById('dlg-topic-title').focus(), 50);
}
function confirmNewTopic() {
  const title = document.getElementById('dlg-topic-title').value.trim();
  if (!title) return;
  const day = journal.find(d => d.date === pendingDate);
  if (!day || day.topics.some(t => t.title === title)) return;
  day.topics.push({ title, content: '' });
  markDirty();
  document.getElementById('dlg-topic').close();
  render(document.getElementById('search').value);
}

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e =>
  render(e.target.value.trim()));

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveFile(); }
});
window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// Dialog Enter-key confirm
document.getElementById('dlg-day').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); confirmNewDay(); }
});
document.getElementById('dlg-topic').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); confirmNewTopic(); }
});

// ── Helpers ────────────────────────────────────────────────────────────────
const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const hl   = (s, q) => esc(s).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
const today = () => new Date().toISOString().slice(0, 10);

function setStatus(file, mode) {
  document.getElementById('status-file').textContent = file;
  document.getElementById('status-mode').textContent = mode;
}
</script>
