<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><strong>Folio</strong></li></ul>
      <ul>
        <li><input id="search" type="search" placeholder="Suchen…" autocomplete="off" /></li>
        <li><button id="btn-new-day" class="outline">+ Neuer Tag</button></li>
        <li><a href="/auth/logout" class="secondary outline" role="button">Abmelden</a></li>
      </ul>
    </nav>
  </header>

  <main class="container" id="journal"></main>

  <template id="tpl-day">
    <section class="day-section">
      <hgroup>
        <h2 class="day-heading"></h2>
        <span class="day-actions">
          <button class="add-topic-btn outline secondary">+ Thema</button>
          <button class="delete-day-btn outline secondary">Löschen</button>
        </span>
      </hgroup>
      <div class="topics"></div>
    </section>
  </template>

  <template id="tpl-topic">
    <article class="topic-article">
      <header>
        <span class="topic-title-wrap">
          <strong class="topic-title"></strong>
          <input class="topic-title-input hidden" type="text" />
        </span>
        <span class="topic-actions">
          <button class="rename-btn outline secondary small">Umbenennen</button>
          <button class="edit-btn outline secondary small">Bearbeiten</button>
          <button class="delete-btn outline secondary small">Löschen</button>
        </span>
      </header>
      <div class="topic-preview"></div>
      <div class="topic-editor hidden">
        <div class="md-toolbar">
          <button type="button" data-action="bold"          title="Fett"><b>B</b></button>
          <button type="button" data-action="italic"        title="Kursiv"><em>I</em></button>
          <button type="button" data-action="strikethrough" title="Durchgestrichen"><s>S</s></button>
          <span class="tb-sep"></span>
          <button type="button" data-action="heading2"      title="Überschrift 2">H2</button>
          <button type="button" data-action="heading3"      title="Überschrift 3">H3</button>
          <span class="tb-sep"></span>
          <button type="button" data-action="ul"            title="Liste">• —</button>
          <button type="button" data-action="ol"            title="Nummeriert">1.</button>
          <span class="tb-sep"></span>
          <button type="button" data-action="link"          title="Link">🔗</button>
          <button type="button" data-action="code"          title="Code">&lt;&gt;</button>
        </div>
        <textarea></textarea>
        <div class="editor-actions">
          <button class="save-btn">Speichern</button>
          <button class="cancel-btn outline secondary">Abbrechen</button>
        </div>
      </div>
    </article>
  </template>

  <!-- Dialog: Neuer Tag -->
  <dialog id="dialog-day">
    <article>
      <header><h3>Neuer Tag</h3></header>
      <label>Datum<input id="input-day-date" type="date" /></label>
      <footer>
        <button id="dialog-day-cancel" class="secondary outline">Abbrechen</button>
        <button id="dialog-day-save">Anlegen</button>
      </footer>
    </article>
  </dialog>

  <!-- Dialog: Neues Thema -->
  <dialog id="dialog-topic">
    <article>
      <header><h3>Neues Thema</h3></header>
      <label>Titel<input id="input-topic-title" type="text" placeholder="Thema" /></label>
      <label>Inhalt<textarea id="input-topic-content" rows="6" placeholder="Optionaler Inhalt…"></textarea></label>
      <footer>
        <button id="dialog-topic-cancel" class="secondary outline">Abbrechen</button>
        <button id="dialog-topic-save">Hinzufügen</button>
      </footer>
    </article>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
